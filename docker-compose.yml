version: "3.9"

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: devflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devflow
      POSTGRES_PASSWORD: devflow_password
      POSTGRES_DB: devflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application Services ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: devflow_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://devflow:devflow_password@postgres:5432/devflow
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai:8000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: devflow_web
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - api

  ai:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    container_name: devflow_ai
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"

  github-bot:
    build:
      context: .
      dockerfile: services/github-bot/Dockerfile
    container_name: devflow_github_bot
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://devflow:devflow_password@postgres:5432/devflow
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai:8000
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
