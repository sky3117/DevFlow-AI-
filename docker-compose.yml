version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: devflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devflow
      POSTGRES_PASSWORD: devflow_password
      POSTGRES_DB: devflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devflow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devflow -d devflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - devflow_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: devflow_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://devflow:devflow_password@postgres:5432/devflow
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    networks:
      - devflow_network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: devflow_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - devflow_network

  ai-service:
    build:
      context: services/ai
      dockerfile: Dockerfile
    container_name: devflow_ai
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8000:8000"
    networks:
      - devflow_network

  github-bot:
    build:
      context: .
      dockerfile: services/github-bot/Dockerfile
    container_name: devflow_github_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3002:3002"
    networks:
      - devflow_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  devflow_network:
    driver: bridge
